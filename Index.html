<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANNY GOODY - Full Calculus Solver</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

/* Background Animation */
.number-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.number{
  position:absolute;
  color:rgba(56, 189, 248, 0.2);
  font-size:18px;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(110vh)}
  to{transform:translateY(-10vh)}
}

/* App Container */
.app{
  background:rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  width:100%;
  max-width:500px;
  padding:20px;
  border-radius:20px;
  color:white;
  z-index:1;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
}

.title{
  text-align:center;
  font-size:24px;
  color:#38bdf8;
  margin: 5px 0;
  letter-spacing: 2px;
}

.subtitle{
  text-align:center;
  font-size:12px;
  opacity:0.7;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border: 1px solid #334155;
  background: #1e293b;
  color: white;
  margin-bottom:10px;
}

input:focus {
  outline: 2px solid #38bdf8;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}

button{
  padding:12px 5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#334155;
  color:white;
  font-weight: bold;
  transition: 0.2s;
}

button:hover{
  background:#38bdf8;
  color:black;
  transform: translateY(-2px);
}

.solve{grid-column:span 3; background:#22c55e; color: white;}
.solve:hover{background:#16a34a; color: white;}
.clear{grid-column:span 3; background:#ef4444; color: white;}
.clear:hover{background:#dc2626; color: white;}

.result, .steps{
  background:#020617;
  margin-top:10px;
  padding:12px;
  border-radius:8px;
  font-size:14px;
  max-height:180px;
  overflow-y:auto;
  border: 1px solid #1e293b;
}

.steps b { color: #38bdf8; }

canvas{
  background:#f8fafc;
  border-radius:10px;
  margin-top:15px;
  width:100%;
  max-height: 200px;
}

.toggle{text-align:right;margin-bottom:5px}
.toggle button{font-size:11px; padding:4px 8px; background: transparent; border: 1px solid #38bdf8; color: #38bdf8;}

/* Light Mode Styles */
.light{ background:#e2e8f0; }
.light .app{ background:white; color:#0f172a; border: 1px solid #cbd5e1; }
.light button{ background:#cbd5e1; color:#0f172a; }
.light .result, .light .steps{ background:#f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
.light input { background: white; color: black; border: 1px solid #cbd5e1; }
</style>
</head>

<body id="body">

<div class="number-bg" id="number-bg"></div>

<div class="app">
  <div class="toggle">
    <button onclick="toggleMode()">🌗 Switch Appearance</button>
  </div>

  <h1 class="title">CANNY GOODY</h1>
  <div class="subtitle">Calculus Solver • Interactive Learning Tool</div>

  <input id="display" placeholder="Enter function e.g. 3x^2 + sin(x)">
  <input id="order" type="number" placeholder="Derivative Order (1, 2, 3...)" value="1">
  <input id="xval" type="number" placeholder="At x = (optional for Tangent Line)">

  <div class="buttons">
    <button onclick="add('sin(')">sin</button>
    <button onclick="add('cos(')">cos</button>
    <button onclick="add('tan(')">tan</button>
    <button onclick="add('ln(')">ln</button>
    <button onclick="add('sqrt(')">√</button>
    <button onclick="add('^')">^</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('+')">+</button>
    <button onclick="add('-')">−</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('/')">÷</button>
    <button onclick="add('x')">x</button>
    <button onclick="add('(')">(</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('0')">0</button>
    <button onclick="add(')')">)</button>
    <button onclick="add('PI')">π</button>

    <button class="solve" onclick="solve()">SOLVE</button>
    <button class="clear" onclick="clearAll()">CLEAR</button>
  </div>

  <div class="result" id="result">Result: <i>Waiting for input...</i></div>
  <div class="steps" id="steps">Steps: <i>Calculation steps will appear here.</i></div>

  <canvas id="graph"></canvas>
</div>

<script>
// Background Animation Script
const bg = document.getElementById("number-bg");
const sym = ["0","1","2","x","+","^","sin","cos","ln","π", "dy/dx", "∫"];
for(let i=0; i<60; i++){
  let s = document.createElement("span");
  s.className = "number";
  s.textContent = sym[Math.floor(Math.random()*sym.length)];
  s.style.left = Math.random()*100 + "vw";
  s.style.animationDuration = (5 + Math.random()*12) + "s";
  s.style.fontSize = (10 + Math.random()*20) + "px";
  s.style.opacity = Math.random();
  bg.appendChild(s);
}

let chart;
const display = document.getElementById("display");
const order = document.getElementById("order");
const xval = document.getElementById("xval");
const result = document.getElementById("result");
const steps = document.getElementById("steps");

function add(v){ display.value += v; }

function clearAll(){
  display.value = "";
  order.value = 1;
  xval.value = "";
  result.innerHTML = "Result:";
  steps.innerHTML = "Steps:";
  if(chart) chart.destroy();
}

function toggleMode(){
  document.getElementById("body").classList.toggle("light");
}

function solve() {
  const exprInput = display.value;
  const n = parseInt(order.value) || 1;
  const xTarget = parseFloat(xval.value);

  if (!exprInput) {
    result.innerHTML = "⚠ Please enter a function.";
    return;
  }

  try {
    let currentExpr = exprInput;
    let stepOutput = `<b>Detailed Steps:</b><br><br>`;
    stepOutput += `Start: f(x) = ${exprInput}<br><hr style="border:0.1px solid #1e293b">`;

    // Loop for derivatives based on Order
    for (let i = 1; i <= n; i++) {
      let prevExpr = currentExpr;
      // Calculate derivative using math.js
      let derived = math.derivative(prevExpr, 'x');
      currentExpr = derived.toString();

      // Rule Detection logic for educational purposes
      let ruleUsed = "Basic Differentiation Rules";
      if (prevExpr.includes('sin') || prevExpr.includes('cos') || prevExpr.includes('tan')) ruleUsed = "Trigonometric Rule";
      else if (prevExpr.includes('^')) ruleUsed = "Power Rule / Chain Rule";
      else if (prevExpr.includes('ln') || prevExpr.includes('log')) ruleUsed = "Logarithmic Rule";
      else if (prevExpr.includes('*') && prevExpr.includes('x')) ruleUsed = "Product Rule / Constant Multiple";

      stepOutput += `Step ${i}: Find $\\frac{d}{dx}$ of (${prevExpr})<br>`;
      stepOutput += `➔ <b>${i}ᵗʰ Derivative: ${currentExpr}</b><br><small>(${ruleUsed})</small><br><br>`;
    }

    result.innerHTML = `Final Result (${n}ᵗʰ Derivative): <br><b style="color:#38bdf8; font-size:18px">${currentExpr}</b>`;

    // Tangent Line Calculation if x is provided
    if (!isNaN(xTarget)) {
      let slope = math.evaluate(currentExpr, { x: xTarget });
      let yCoord = math.evaluate(exprInput, { x: xTarget });
      
      stepOutput += `<hr style="border:0.1px solid #1e293b"><b>Tangent Line at x = ${xTarget}:</b><br>`;
      stepOutput += `1. Find y-coordinate: f(${xTarget}) = ${yCoord.toFixed(4)}<br>`;
      stepOutput += `2. Slope (m) from derivative: m = ${slope.toFixed(4)}<br>`;
      stepOutput += `3. Equation: y - ${yCoord.toFixed(2)} = ${slope.toFixed(2)}(x - ${xTarget})`;
    }

    steps.innerHTML = stepOutput;
    drawGraph(exprInput, currentExpr);

  } catch (e) {
    result.innerHTML = "⚠ Invalid Expression. Please check your math syntax.";
    console.error(e);
  }
}

function drawGraph(f, df){
  let xs = [], ys = [], dys = [];
  try {
    for(let x = -5; x <= 5; x += 0.2){
      xs.push(x.toFixed(1));
      ys.push(math.evaluate(f, {x}));
      dys.push(math.evaluate(df, {x}));
    }

    let ctx = document.getElementById("graph").getContext("2d");
    if(chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: xs,
        datasets: [
          { label: 'f(x)', data: ys, borderColor: '#3b82f6', tension: 0.4, borderWidth: 2, pointRadius: 0 },
          { label: "f'(x)", data: dys, borderColor: '#ef4444', tension: 0.4, borderWidth: 2, pointRadius: 0 }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#64748b' } } },
        scales: {
          x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(0,0,0,0.05)' } },
          y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(0,0,0,0.05)' } }
        }
      }
    });
  } catch(err) {
    console.log("Graph error:", err);
  }
}
</script>

</body>
</html>
